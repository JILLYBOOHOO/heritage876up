<section class="register">
    <div class="register-card">
        <h2>Register</h2>
        <div *ngIf="error" class="error-message">{{ error }}</div>
        <form (ngSubmit)="onRegister()">
            <input type="text" name="name" [(ngModel)]="user.name" placeholder="Name" autocomplete="name" required>
            <input type="email" name="email" [(ngModel)]="user.email" placeholder="Email" autocomplete="email" required>
            <input type="password" name="password" [(ngModel)]="user.password" placeholder="Password"
                autocomplete="new-password" required>
            <button type="submit" class="btn">Register</button>
        </form>
        <p>Already have an account?</p>
        <a routerLink="/login" class="btn-secondary">Login here</a>
    </div>
</section>
