<section class="order-history">
    <div class="history-card">
        <h2>My Order History</h2>

        <div *ngIf="orders.length === 0" class="no-orders">
            <p>You haven't placed any orders yet.</p>
            <button class="btn" routerLink="/products">Start Shopping</button>
        </div>

        <div *ngIf="orders.length > 0" class="orders-list">
            <div *ngFor="let order of orders" class="order-item">
                <div class="order-info">
                    <span class="order-id">Order #{{ order.id }}</span>
                    <span class="order-date">{{ order.order_date | date:'mediumDate' }}</span>
                </div>
                <div class="order-details">
                    <span class="order-amount">Total: ${{ order.total_amount }}</span>
                    <span class="order-status" [ngClass]="order.status">{{ order.status }}</span>
                </div>
            </div>
        </div>

        <button class="btn-outline" routerLink="/dashboard">Back to Dashboard</button>
    </div>
</section>
